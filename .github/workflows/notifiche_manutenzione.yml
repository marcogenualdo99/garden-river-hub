name: Notifiche Ticket Manutenzione

on:
  schedule:
    - cron: '*/5 * * * *'   # ogni 5 minuti (minimo consentito da GitHub Actions)
  workflow_dispatch:          # avvio manuale dalla tab Actions per test

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install google-auth requests
      - name: Invia notifiche ticket manutenzione
        env:
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: python .github/scripts/send_notifiche_manutenzione.py
